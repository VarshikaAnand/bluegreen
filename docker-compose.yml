version: "3.8"

services:
  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/upstream_app.conf:/etc/nginx/conf.d/upstream_app.conf:ro
    depends_on:
      - blue
      - green

  blue:
    build: ./app
    container_name: blue
    environment:
      - ENV_NAME=blue
    expose:
      - "3000"

  green:
    build: ./app
    container_name: green
    environment:
      - ENV_NAME=green
    expose:
      - "3000"
